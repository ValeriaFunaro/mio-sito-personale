name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile SCSS to CSS
        run: |
          npx sass --style=compressed --no-source-map assets/sass/:dist/css/
          echo "CSS compilato:"
          ls -la dist/css/

      - name: Prepare site for deployment
        run: |
          mkdir -p _site
          rsync -av \
            --exclude='_site' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.vscode' \
            --exclude='node_modules' \
            --exclude='assets/sass' \
            --exclude='*.map' \
            --exclude='README.md' \
            ./ _site/
          touch _site/.nojekyll
          echo "Contenuto _site/:"
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
